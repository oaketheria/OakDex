ou<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body class="home-page">
    <div class="pokemon-home">
      <main class="pokemon-hero">
        <section class="pokemon-hero-inner">
          <div class="pokemon-copy">
            <div class="pokemon-logo-lockup">
              <img
                class="pokemon-logo-image"
                src="./assets/logo2.png"
                alt="Entre no mundo Pokemon antes de abrir sua Pokedex"
              />
            </div>

            <div class="pokemon-cta-group">
              <a class="pokemon-cta pokemon-cta-emerald" href="./emulator.html">Abrir emulador</a>
              <a class="pokemon-cta pokemon-cta-primary" href="./pokedex.html">Abrir Pokedex</a>
              <a class="pokemon-cta pokemon-cta-secondary" href="./destaques.html">Ver destaques</a>
            </div>
          </div>

          <div class="pokemon-artboard" aria-label="Arte principal">
            <div class="pokemon-art-card">
              <img
                class="pokemon-art-image"
                src="./assets/legendary.png"
                alt="Arte lendaria pokemon com efeito 3D"
              />
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
